<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #ff8c00, #ff5e00);
        }

        .card {
            width: 320px;
            padding: 30px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);

            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;

            border-radius: 25px;
            border: none;

            background: #f1f1f1;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;

            border-radius: 25px;
            border: none;

            background: linear-gradient(135deg, #ff8c00, #ff5e00);
            color: white;
            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #333;
        }

    </style>
</head>

<body>

    <div class="card">
        <h2>Forgot Password</h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Enter Email" required>
            <button type="submit">Send OTP</button>
        </form>

        <a href="/security_login" class="back">← Back to Login</a>
    </div>

</body>
</html>
