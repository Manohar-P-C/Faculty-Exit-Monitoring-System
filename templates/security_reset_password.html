<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #ff8c00, #ff5e00);
        }

        .container {
            width: 350px;
            padding: 30px;

            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;

            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;

            border: none;
            border-radius: 25px;

            background: #f1f1f1;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            background: #e8e8e8;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;

            border: none;
            border-radius: 25px;

            background: linear-gradient(135deg, #ff8c00, #ff5e00);
            color: white;
            font-weight: bold;
            font-size: 15px;

            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="icon">🔐</div>

        <h2>Reset Password</h2>

        <form method="POST" action="/security_reset_password">

            <!-- hidden email -->
            <input type="hidden" name="email" value="{{ email }}">

            <input type="text" name="otp" placeholder="Enter OTP" required>

            <input type="password" name="new_password" placeholder="New Password" required>

            <button type="submit">Reset Password</button>

        </form>

    </div>

</body>
</html>
