<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
<style>
body{
background: linear-gradient(120deg,#0f4c81,#1e6bb8,#ff8c00);
font-family: Arial;
}
.card{
width:400px;
margin:auto;
margin-top:150px;
background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}
input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

.password-wrapper{
position:relative;
display:inline-block;
width:90%;
}

.password-wrapper input{
width:100%;
padding-right:40px;
margin:10px 0;
}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
color:#666;
background:none;
border:none;
padding:0;
margin:0;
line-height:1;
user-select:none;
transition:color 0.2s;
}

.toggle-password:hover{
color:#333;
}

button{
background:#1e6bb8;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>
<div class="card">
<h2>Verify OTP</h2>
<p>OTP sent to {{ email }}</p>
<form method="POST">
<input type="text" name="otp" placeholder="Enter OTP" required>
<div class="password-wrapper">
<input type="password" id="passwordField" name="new_password" placeholder="Enter New Password" required>
<span class="toggle-password" onclick="togglePassword()">👁️</span>
</div>
<br>
<button type="submit">Reset Password</button>
</form>
{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}
</div>
<script>
function togglePassword(){
var f=document.getElementById('passwordField');
var t=document.querySelector('.toggle-password');
if(f.type==='password'){f.type='text';t.textContent='🙈';}
else{f.type='password';t.textContent='👁️';}
}
</script>
</body>
</html>
