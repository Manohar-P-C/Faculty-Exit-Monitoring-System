<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>Faculty Reset Password</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#0f4c81,#1e6bb8,#ff8c00);
background-size:300% 300%;

animation:gradientMove 10s ease infinite;

}

/* BACKGROUND ANIMATION */

@keyframes gradientMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* GLASS CARD */

.container{

width:420px;

backdrop-filter:blur(20px);

background:rgba(255,255,255,0.15);

border-radius:20px;

padding:45px;

box-shadow:0 25px 45px rgba(0,0,0,0.25);

border:1px solid rgba(255,255,255,0.2);

text-align:center;

}

/* TITLE */

.title{

font-size:28px;
font-weight:600;
color:white;
margin-bottom:10px;

}

.subtitle{

font-size:14px;
color:#f1f1f1;
margin-bottom:35px;

}

/* INPUT GROUP */

.inputBox{

position:relative;
margin-bottom:25px;

}

.inputBox input{

width:100%;
padding:12px 14px;

border:none;
outline:none;

border-radius:8px;

background:rgba(255,255,255,0.9);

font-size:14px;

transition:0.3s;

}

/* FOCUS EFFECT */

.inputBox input:focus{

box-shadow:0 0 10px rgba(255,255,255,0.6);

}

/* BUTTON */

button{

width:100%;

padding:12px;

border:none;
border-radius:10px;

background:#ff8c00;

color:white;

font-size:16px;
font-weight:500;

cursor:pointer;

transition:0.3s;

}

/* BUTTON HOVER */

button:hover{

background:#ff7200;

transform:scale(1.05);

box-shadow:0 5px 15px rgba(0,0,0,0.3);

}

/* FOOTER */

.footer{

margin-top:20px;
font-size:12px;
color:#eee;

}

</style></head><body><div class="container"><div class="title">Faculty Reset Password</div><div class="subtitle">
Sai Vidya Institute of Technology
</div><form method="POST" action="/faculty_reset_password"><input type="hidden" name="email" value="{{email}}"><div class="inputBox">
<input type="number" name="otp" placeholder="Enter OTP" required>
</div><div class="inputBox">
<input type="password" name="new_password" placeholder="New Password" required>
</div><button type="submit">Reset Password</button>

</form><div class="footer">
Secure Verification Portal
</div></div></body>
</html>
