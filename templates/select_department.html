<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Department</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:radial-gradient(circle at 20% 20%, #7dd3fc, transparent),
           radial-gradient(circle at 80% 80%, #c084fc, transparent),
           radial-gradient(circle at 50% 50%, #fca5a5, transparent),
           linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* ===== GLASS CARD ===== */
.card{
width:760px;
padding:40px;
border-radius:24px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(30px);
box-shadow:0 40px 80px rgba(0,0,0,0.15);
animation:fadeIn 0.8s ease;
}

/* ===== FADE IN ===== */
@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== HEADER ===== */
.header{
text-align:center;
margin-bottom:25px;
}

.header h2{
font-size:28px;
color:#1e293b;
}

.header p{
color:#64748b;
margin-top:5px;
}

/* ===== SEARCH ===== */
.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
outline:none;
background:#f1f5f9;
transition:0.3s;
}

.search input:focus{
background:white;
box-shadow:0 0 0 3px rgba(59,130,246,0.2);
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

/* ===== CARD ===== */
.dept{
padding:18px;
border-radius:16px;
background:linear-gradient(145deg,#ffffff,#e6edf5);
cursor:pointer;
transition:all 0.3s ease;
position:relative;
overflow:hidden;
font-weight:600;
color:#334155;
}

/* glow hover */
.dept:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

/* light effect */
.dept::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
transition:0.5s;
}

.dept:hover::before{
left:100%;
}

/* SELECTED */
input[type="radio"]{
display:none;
}

input[type="radio"]:checked + .dept{
background:linear-gradient(135deg,#3b82f6,#9333ea);
color:white;
box-shadow:0 20px 40px rgba(147,51,234,0.4);
transform:scale(1.08);
}

/* ===== BUTTON ===== */
button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#f97316,#ec4899,#8b5cf6);
background-size:300% 300%;
animation:gradientMove 5s infinite;
transition:0.3s;
}

/* animated gradient */
@keyframes gradientMove{
0%{background-position:0%;}
50%{background-position:100%;}
100%{background-position:0%;}
}

/* hover */
button:hover{
transform:scale(1.05);
box-shadow:0 20px 40px rgba(236,72,153,0.4);
}

/* ===== RESPONSIVE ===== */
@media(max-width:750px){
.card{width:90%;}
.grid{grid-template-columns:repeat(2,1fr);}
}

</style>

</head>

<body>

<div class="card">

<div class="header">
<h2>🏫 Select Department</h2>
<p>Choose your department to continue</p>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search department...">
</div>

<form method="POST">

<div class="grid" id="grid">

<input type="radio" name="department" value="CSE" id="d1" required>
<label for="d1" class="dept">💻 Computer Science</label>

<input type="radio" name="department" value="AI" id="d2">
<label for="d2" class="dept">🤖 AI & ML</label>

<input type="radio" name="department" value="ISE" id="d3">
<label for="d3" class="dept">🖥 Information Science</label>

<input type="radio" name="department" value="ECE" id="d4">
<label for="d4" class="dept">📡 Electronics</label>

<input type="radio" name="department" value="CIVIL" id="d5">
<label for="d5" class="dept">🏗 Civil</label>

<input type="radio" name="department" value="MECH" id="d6">
<label for="d6" class="dept">⚙ Mechanical</label>

<input type="radio" name="department" value="MATHS" id="d7">
<label for="d7" class="dept">📐 Mathematics</label>

<input type="radio" name="department" value="PHYSICS" id="d8">
<label for="d8" class="dept">🔬 Physics</label>

<input type="radio" name="department" value="CHEM" id="d9">
<label for="d9" class="dept">⚗ Chemistry</label>

<input type="radio" name="department" value="MBA" id="d10" required>
<label for="d10" class="dept">📊 MBA</label>

<input type="radio" name="department" value="CSDS" id="d11">
<label for="d11" class="dept">💾 CSDS</label>

</div>

<button type="submit">Continue →</button>

</form>

</div>

<script>

/* SEARCH FILTER */
document.getElementById("search").addEventListener("keyup", function(){
let value = this.value.toLowerCase();
let items = document.querySelectorAll(".dept");

items.forEach(item=>{
item.style.display = item.innerText.toLowerCase().includes(value)
? "block" : "none";
});
});

</script>

</body>
</html>
